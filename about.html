<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-TPWP25L2');</script>

    <title>About Me | Maja Augustsson</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@100..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'beige': '#E8C39E',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TPWP25L2"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Reusable Components
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const FadeInSection = ({ children, className = "" }) => (
            <motion.div
                initial={{ opacity: 0, y: 50 }}
                whileInView={{ opacity: 1, y: 0 }}
                viewport={{ once: true, margin: "-50px" }}
                transition={{ duration: 0.8, ease: "easeOut" }}
                className={className}
            >
                {children}
            </motion.div>
        );

        const Nav = () => (
            <nav className="fixed top-0 left-0 w-full z-50 text-white px-6 py-8 flex justify-between items-center bg-black/50 backdrop-blur-sm">
                <a href="index.html" className="font-serif italic text-2xl tracking-tighter">Maja <span className="text-beige">Augustsson.</span></a>
                <div className="hidden md:flex gap-12 text-[10px] font-medium uppercase tracking-[0.3em] text-zinc-400">
                    <a href="about.html" className="hover:text-white transition-colors">About Me</a>
                    <a href="index.html#work" className="hover:text-white transition-colors">Work</a>
                    <a href="index.html#bag" className="hover:text-white transition-colors">The Bag</a>
                    <a href="index.html#contact" className="hover:text-white transition-colors">Contact</a>
                </div>
            </nav>
        );

        const SectionHeader = ({ number, title }) => (
            <div className="flex items-center gap-4 border-b border-zinc-900 pb-4 mb-12">
                <span className="mono-label">{number}</span>
                <h2 className="text-xs uppercase font-bold tracking-[0.3em] text-zinc-400">{title}</h2>
            </div>
        );

        const Footer = () => (
            <footer className="px-6 py-16 border-t border-zinc-900 bg-black">
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                    <div className="mono-label text-zinc-700">© 2026 Maja Augustsson</div>
                    <div className="mono-label text-zinc-700">Growth / Strategy / Design</div>
                </div>
            </footer>
        );

        const ScrollToTop = () => {
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const toggleVisibility = () => setIsVisible(window.scrollY > 300);
                window.addEventListener('scroll', toggleVisibility);
                return () => window.removeEventListener('scroll', toggleVisibility);
            }, []);
            return (
                <AnimatePresence>
                    {isVisible && (
                        <motion.button
                            initial={{ opacity: 0, scale: 0.5 }}
                            animate={{ opacity: 1, scale: 1 }}
                            exit={{ opacity: 0, scale: 0.5 }}
                            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                            className="fixed bottom-8 right-8 z-50 bg-white text-black p-3 rounded-full shadow-lg hover:bg-beige transition-colors"
                        >
                            <Icon name="arrow-up" size={24} />
                        </motion.button>
                    )}
                </AnimatePresence>
            );
        };

        const BookHover = ({ children }) => {
            const [isHovered, setIsHovered] = useState(false);

            return (
                <motion.div
                    onHoverStart={() => setIsHovered(true)}
                    onHoverEnd={() => setIsHovered(false)}
                    className="relative inline-block"
                >
                    {children}
                    <AnimatePresence>
                        {isHovered && (
                            <motion.div
                                initial={{ opacity: 0, scale: 0.8, y: 10 }}
                                animate={{ opacity: 1, scale: 1, y: 0 }}
                                exit={{ opacity: 0, scale: 0.8, y: 10 }}
                                transition={{ type: 'spring', stiffness: 300, damping: 20 }}
                                className="absolute bottom-full left-1/2 -translate-x-1/2 mb-4 p-2 w-40 rounded-lg shadow-xl bg-white/10 backdrop-blur-md border border-white/20"
                            >
                                <img src="acourt.jpg" alt="Currently reading book cover" className="w-full h-auto rounded-md" />
                            </motion.div>
                        )}
                    </AnimatePresence>
                </motion.div>
            );
        };

        const DownloadSection = () => {
            const [isDownloaded, setIsDownloaded] = useState(false);

            const handleDownload = () => {
                setIsDownloaded(true);
                
                // Confetti animation
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#E8C39E', '#ffffff']
                });
            };

            return (
                <FadeInSection>
                    <div className="mt-24 pt-16 border-t border-zinc-800 text-center">
                        <motion.div
                            animate={{ scale: [1, 1.05, 1] }}
                            transition={{ duration: 3, repeat: Infinity, ease: "easeInOut" }}
                            className="inline-block mb-8"
                        >
                            <Icon name="book-open" size={48} className="text-beige" />
                        </motion.div>

                        <h2 className="text-4xl font-serif italic mb-6">
                            From one homebody to another
                        </h2>
                        
                        <p className="text-lg text-zinc-300 leading-relaxed font-light max-w-2xl mx-auto mb-10">
                            I’ve put together a small guide called The Stockholm Reader’s Guide. It’s a collection of my favorite spots, books, and rituals that make my life in Stockholm special.
                        </p>

                        <motion.a 
                            href="guide.pdf"
                            download="The Stockholm Readers Guide.pdf"
                            onClick={handleDownload}
                            whileHover={{ scale: 1.05 }}
                            transition={{ type: 'spring', stiffness: 300 }}
                            className={`inline-block font-bold rounded-md px-8 py-4 transition-all duration-500 ${isDownloaded ? 'bg-zinc-800 text-white' : 'bg-beige text-black hover:bg-opacity-90'}`}
                        >
                            {isDownloaded ? 'Enjoy your reading! ✨' : 'Download my guide'}
                        </motion.a>
                    </div>
                </FadeInSection>
            );
        };

        // Page Specific Content
        const AboutPage = () => (
            <main className="pt-48 px-6 pb-24 bg-black text-white">
                <div className="max-w-3xl mx-auto">
                    <FadeInSection>
                        <SectionHeader number="00" title="About Me" />
                        <h1 className="text-5xl md:text-6xl font-serif italic mb-12 leading-tight">
                            A little bit about me
                        </h1>
                        
                        <div className="space-y-6 text-lg text-zinc-300 leading-relaxed font-light">
                            <p>
                                I’m a 23-year-old creative living in beautiful Kungsholmen, Stockholm. My journey began in 2021 when I started working in childcare—a role I took on because of my love for people and my drive to get a head start in my professional life. However, I always knew deep down that marketing was my true calling. Whether it was managing my own YouTube and TikTok channels or helping friends with their social media presence, I’ve always had a natural connection to the digital landscape.
                            </p>
                            <p>
                                To turn that passion into expertise, I took a foundation course at Berghs School of Communication. That experience was a turning point; it opened my eyes to the industry and eventually led me back to Berghs for a full two-year program. Between my studies, I worked as a Stylist Assistant and Social Media Content Creator for a fashion brand called Rose Room Academy. It was a dream job in many ways, but it also made me realize I wanted even deeper knowledge to truly excel. Today, equipped with both a solid education and hands-on experience, I feel ready and confident to make my mark in the marketing industry.
                            </p>
                        </div>
                    </FadeInSection>

                    <FadeInSection>
                        <div className="mt-24 pt-16 border-t border-zinc-800">
                            <h2 className="text-3xl font-serif italic mb-8">Outside of work & studies</h2>
                            <div className="space-y-6 text-lg text-zinc-300 leading-relaxed font-light">
                                <p>
                                    When I’m not analyzing data or creating content, you’ll likely find me moving. I have a background in elite-level football, though these days I focus on the gym and long runs outdoors. My family means everything to me, and I’m a true homebody at heart. On weekends, I’m usually curled up with a book (perhaps not my most "wild" trait, but if you need a book recommendation, I’m your person!).
                                </p>
                                <p className="text-zinc-400 italic">
                                    PS. This is what I’m reading right now: <BookHover><span className="text-beige underline decoration-dotted cursor-pointer">this book</span></BookHover>.
                                </p>
                            </div>
                        </div>
                    </FadeInSection>

                    <DownloadSection />
                </div>
            </main>
        );

        const App = () => (
            <div className="bg-black min-h-screen font-sans">
                <Nav />
                <AboutPage />
                <Footer />
                <ScrollToTop />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
